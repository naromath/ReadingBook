{% extends "base.html" %}

{% block title %}ISBN Scan - AI 독서 비서{% endblock %}

{% block content %}
<section class="hero-panel compact">
    <div class="section-row">
        <h1 class="hero-title">ISBN Scanner</h1>
        <a href="{{ url_for('search') }}" class="ghost-btn">Manual Search</a>
    </div>
    <p class="muted-copy">스마트폰 후면 카메라로 책 뒷면 바코드를 비춰 주세요.</p>

    <div id="camera-container">
        <video id="video" autoplay playsinline muted style="display: none;"></video>
        <div id="camera-placeholder" class="camera-placeholder">
            카메라를 켜고 바코드를 중앙 가이드에 맞춰 주세요.
        </div>
        <div class="scan-focus-box" aria-hidden="true"></div>
    </div>

    <div class="scan-controls">
        <button type="button" id="start-camera" class="btn-primary-solid">카메라 켜기</button>
        <button type="button" id="stop-camera" class="btn-soft" disabled>중지</button>
    </div>

    <div id="status" class="status-panel">대기 중: 카메라를 켜면 ISBN을 자동 인식합니다.</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-camera');
    const stopBtn = document.getElementById('stop-camera');
    const placeholder = document.getElementById('camera-placeholder');
    const statusBox = document.getElementById('status');
    let codeReader = null;
    let controls = null;
    let hasDetected = false;

    const setStatus = (message, type = 'info') => {
        statusBox.textContent = message;
        statusBox.classList.remove('error', 'success');
        if (type === 'error') statusBox.classList.add('error');
        if (type === 'success') statusBox.classList.add('success');
    };

    const extractIsbn = (rawText) => {
        if (!rawText) return null;
        const text = rawText.replace(/[^0-9Xx]/g, '');
        const isbn13Match = text.match(/97[89]\d{10}/);
        if (isbn13Match) return isbn13Match[0];
        const isbn10Match = text.match(/\d{9}[\dXx]/);
        if (isbn10Match) return isbn10Match[0].toUpperCase();
        return null;
    };

    const stopScanning = () => {
        if (controls) {
            controls.stop();
            controls = null;
        }
        if (codeReader) {
            codeReader.reset();
        }
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        video.style.display = 'none';
        placeholder.style.display = 'flex';
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    startBtn.onclick = async () => {
        try {
            if (!window.ZXing) {
                setStatus('바코드 스캐너 로딩에 실패했습니다. 네트워크 상태를 확인해 주세요.', 'error');
                return;
            }

            hasDetected = false;
            setStatus('카메라 준비 중입니다...');
            startBtn.disabled = true;
            stopBtn.disabled = false;

            const hints = new Map();
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                ZXing.BarcodeFormat.EAN_13,
                ZXing.BarcodeFormat.EAN_8,
                ZXing.BarcodeFormat.UPC_A,
                ZXing.BarcodeFormat.CODE_128
            ]);

            codeReader = new ZXing.BrowserMultiFormatReader(hints, 300);
            const devices = await codeReader.listVideoInputDevices();
            if (!devices.length) {
                throw new Error('사용 가능한 카메라가 없습니다.');
            }

            const backCamera = devices.find((d) => /back|rear|environment/i.test(d.label));
            const selectedDeviceId = (backCamera || devices[0]).deviceId;

            controls = await codeReader.decodeFromVideoDevice(selectedDeviceId, video, (result, error) => {
                if (hasDetected) return;

                if (result) {
                    const rawCode = result.getText();
                    const isbn = extractIsbn(rawCode);
                    if (!isbn) {
                        setStatus(`바코드(${rawCode})는 읽었지만 ISBN 형식이 아닙니다.`, 'error');
                        return;
                    }

                    hasDetected = true;
                    if (navigator.vibrate) navigator.vibrate(120);
                    setStatus(`ISBN 인식 성공: ${isbn} / 알라딘에서 조회 중입니다...`);

                    fetch(`/api/isbn/${encodeURIComponent(isbn)}`)
                        .then(async (res) => {
                            const data = await res.json();
                            if (!res.ok || data.status !== 'success') {
                                throw new Error(data.message || '조회 실패');
                            }
                            const book = data.data;
                            const author = (book.authors && book.authors.length) ? book.authors[0] : '저자 정보 없음';
                            setStatus(`조회 완료: "${book.title}" / ${author}`, 'success');
                        })
                        .catch((err) => {
                            setStatus(`알라딘 조회 실패(${err.message || err}) - 검색 페이지에서 확인해 주세요.`, 'error');
                        })
                        .finally(() => {
                            stopScanning();
                            setTimeout(() => {
                                window.location.href = `/search?q=${encodeURIComponent(isbn)}&query_type=ISBN13`;
                            }, 900);
                        });
                    return;
                }

                if (error && !(error instanceof ZXing.NotFoundException)) {
                    setStatus(`스캔 중 오류: ${error.message || error}`, 'error');
                }
            });

            video.style.display = 'block';
            placeholder.style.display = 'none';
            setStatus('스캔 중: 바코드를 중앙 가이드에 0.5초 이상 고정해 주세요.');
        } catch (err) {
            stopScanning();
            setStatus(`카메라 시작 실패: ${err.message || err}`, 'error');
        }
    };

    stopBtn.onclick = () => {
        stopScanning();
        setStatus('스캔이 중지되었습니다.');
    };

    window.addEventListener('beforeunload', stopScanning);
</script>
{% endblock %}
